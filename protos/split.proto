syntax = "proto3";

package lance.datafusion;

import "filtered_read.proto";

// A single unit of work for distributed execution.
message SplitProto {
  FilteredReadExecProto filtered_read_exec = 3;

  // Ordered column names of the user's originally requested output projection.
  // The exec's own projection may include additional filter-only columns; these
  // names capture the columns the user originally selected, in order, including
  // metadata columns like _rowid and _rowaddr.
  repeated string output_columns = 4;
}
